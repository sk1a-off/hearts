<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ночное сердце</title>
  <style>
    :root {
      --bg-top: #040914;
      --bg-mid: #0a1c3d;
      --bg-bot: #173f79;
      --text: #eaf2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 650px at 18% 20%, rgba(92, 130, 255, .16), transparent 60%),
        radial-gradient(950px 600px at 84% 22%, rgba(105, 205, 255, .14), transparent 60%),
        radial-gradient(1200px 720px at 50% 120%, rgba(98, 140, 240, .34), transparent 64%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 52%, var(--bg-bot));
    }

    .stars-bg,
    .stars-bg::before,
    .stars-bg::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars-bg {
      background-image:
        radial-gradient(1.7px 1.7px at 8% 17%, rgba(255,255,255,.84) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 25% 36%, rgba(255,255,255,.74) 45%, transparent 50%),
        radial-gradient(1.6px 1.6px at 41% 16%, rgba(255,255,255,.76) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 57% 44%, rgba(255,255,255,.72) 45%, transparent 50%),
        radial-gradient(1.7px 1.7px at 72% 20%, rgba(255,255,255,.82) 45%, transparent 50%),
        radial-gradient(1.4px 1.4px at 88% 34%, rgba(255,255,255,.68) 45%, transparent 50%),
        radial-gradient(1.4px 1.4px at 79% 70%, rgba(255,255,255,.66) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 33% 78%, rgba(255,255,255,.7) 45%, transparent 50%);
      animation: sky-twinkle 5.2s ease-in-out infinite alternate;
    }

    @keyframes sky-twinkle {
      0%, 100% { opacity: .75; }
      50% { opacity: 1; }
    }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: clamp(62px, 10vw, 88px);
      aspect-ratio: 1;
      border: none;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 4;
      -webkit-tap-highlight-color: transparent;
    }

    .star-shape {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(3.1rem, 9.8vw, 4.2rem);
      color: #e8f3ff;
      text-shadow:
        0 0 10px rgba(198, 219, 246, .86),
        0 0 22px rgba(150, 184, 226, .58),
        0 0 38px rgba(125, 162, 207, .36);
      animation: star-breathe 2.8s ease-in-out infinite;
    }

    .star .letter {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: clamp(.9rem, 3.2vw, 1.05rem);
      color: #152747;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .4s ease, transform .4s ease;
    }

    .star.revealed .letter {
      opacity: 1;
      transform: translateY(0);
    }

    .star.revealed .star-shape {
      animation: star-pop .56s ease forwards;
      color: #f4d98f;
    }

    .star.hidden { opacity: 0; pointer-events: none; transition: opacity .28s ease; }

    @keyframes star-breathe {
      0%, 100% { transform: scale(.98); }
      50% { transform: scale(1.08); }
    }

    @keyframes star-pop {
      0% { transform: scale(1); }
      35% { transform: scale(1.34); filter: brightness(1.2); }
      100% { transform: scale(1.05); }
    }

    .comet {
      position: absolute;
      width: clamp(22px, 5.4vw, 28px);
      height: clamp(22px, 5.4vw, 28px);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 33% 30%, #ffffff 0%, #e6f2ff 32%, #bad2ef 72%, rgba(145, 174, 214, .2) 100%);
      box-shadow: 0 0 14px rgba(196, 220, 249, .8), 0 0 34px rgba(151, 187, 231, .4);
      z-index: 6;
      pointer-events: none;
    }

    .trail-dot {
      position: absolute;
      width: var(--s, 10px);
      height: var(--s, 10px);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(222,236,255,.9), rgba(168,197,234,.45) 55%, rgba(141,171,214,0) 100%);
      filter: blur(var(--b, 2px));
      opacity: var(--o, .4);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 5;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #f7fbff 0%, #cfe0f7 58%, #94b2d8 100%);
      box-shadow: 0 0 10px rgba(175, 203, 237, .6);
      animation: particle-fly 1350ms cubic-bezier(.14,.64,.2,1) forwards;
      z-index: 7;
      pointer-events: none;
    }

    @keyframes particle-fly {
      0% { opacity: .95; transform: translate(-50%, -50%) scale(.72); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.06); }
    }

    .heart-text {
      position: absolute;
      inset: 0;
      transform: scale(.92);
      transform-origin: 50% 52%;
      opacity: 0;
      pointer-events: none;
      z-index: 3;
      filter: brightness(1) saturate(1) hue-rotate(0deg) drop-shadow(0 0 13px rgba(153, 52, 72, .35));
      transition: opacity 900ms ease, transform 1200ms cubic-bezier(.2,.7,.2,1);
    }

    .heart-text.revealing,
    .heart-text.show {
      opacity: 1;
      transform: scale(1);
    }

    .heart-text.show {
      animation: heart-pulse 7200ms ease-in-out 1200ms infinite;
      will-change: transform, filter;
    }

    .heart-line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: #f3a4bd;
      font-family: "DejaVu Sans Mono", "Cascadia Mono", "SFMono-Regular", "Courier New", monospace;
      font-weight: 900;
      letter-spacing: .03em;
      font-size: clamp(8.6px, .9vw, 11.6px);
      white-space: pre;
      text-transform: uppercase;
      opacity: 0;
      animation: line-reveal 1600ms cubic-bezier(.2,.72,.2,1) forwards;
      text-shadow:
        0 0 5px rgba(255, 187, 207, .26),
        0 0 14px rgba(206, 87, 124, .16);
    }

    .wave {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid rgba(224, 171, 195, .72);
      box-shadow: 0 0 10px rgba(224, 171, 195, .35);
      transform: translate(-50%, -50%);
      animation: wave-expand 1400ms cubic-bezier(.14,.64,.2,1) forwards;
      z-index: 7;
      pointer-events: none;
    }

    @keyframes line-reveal {
      0% { opacity: 0; transform: translateX(-50%) scale(.96); }
      55% { opacity: 1; transform: translateX(-50%) scale(1.006); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    @keyframes wave-expand {
      0% { opacity: .9; transform: translate(-50%, -50%) scale(.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(8.5); }
    }

    @keyframes heart-pulse {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1) saturate(1) hue-rotate(0deg) drop-shadow(0 0 13px rgba(153, 52, 72, .32));
      }
      25% {
        transform: scale(1.006);
        filter: brightness(1.045) saturate(1.08) hue-rotate(-3deg) drop-shadow(0 0 15px rgba(235, 139, 171, .36));
      }
      50% {
        transform: scale(1.018);
        filter: brightness(1.105) saturate(1.16) hue-rotate(7deg) drop-shadow(0 0 20px rgba(255, 157, 190, .44));
      }
      75% {
        transform: scale(1.006);
        filter: brightness(1.045) saturate(1.08) hue-rotate(3deg) drop-shadow(0 0 15px rgba(244, 170, 154, .36));
      }
    }

    .status {
      position: fixed;
      left: 50%;
      bottom: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: #edf6ff;
      font-weight: 700;
      letter-spacing: .4px;
      text-shadow: 0 2px 8px rgba(17, 28, 49, .55);
      background: rgba(8, 19, 37, .4);
      border: 1px solid rgba(178, 203, 236, .32);
      border-radius: 999px;
      padding: 8px 16px;
      max-width: calc(100vw - 24px);
      white-space: nowrap;
      font-size: clamp(12px, 3.6vw, 16px);
      backdrop-filter: blur(7px);
      z-index: 20;
    }

    @media (max-width: 560px) {
      .heart-text {
        filter: drop-shadow(0 0 9px rgba(153, 52, 72, .32));
      }

      .heart-line {
        letter-spacing: .015em;
        text-shadow: 0 0 4px rgba(210, 110, 140, .18);
      }
    }
  </style>
</head>
<body>
  <div class="stars-bg" aria-hidden="true"></div>
  <main class="sky" id="sky" aria-label="Небо"></main>
  <section class="heart-text" id="heartText" aria-label="Сердце из текста"></section>
  <div class="status" id="status">Нажимай на звезды · 0/10</div>

  <script>
    const letters = ["Я", "Л", "Ю", "Б", "Л", "Ю", "Т", "Е", "Б", "Я"];
    const positions = [
      [6, 10], [19, 28], [33, 14], [48, 38], [63, 20],
      [79, 46], [92, 26], [74, 66], [52, 84], [14, 74]
    ];

    const sky = document.getElementById("sky");
    const status = document.getElementById("status");
    const heartText = document.getElementById("heartText");

    let opened = 0;
    let assembling = false;
    let assemblyPending = false;
    let assemblyReadyAt = 0;
    let orbitHandle = null;
    let lastFrame = performance.now();
    let arrivedToHeart = 0;
    let heartRows = [];
    let heartRowCursor = 0;
    let revealedHeartRows = new Set();

    const stars = [];
    const comets = [];

    function makeStar(letter, i) {
      const btn = document.createElement("button");
      btn.className = "star";
      btn.type = "button";
      btn.style.left = `${positions[i][0]}%`;
      btn.style.top = `${positions[i][1]}%`;
      btn.setAttribute("aria-label", `Звезда ${i + 1}`);

      const shape = document.createElement("span");
      shape.className = "star-shape";
      shape.textContent = "✦";

      const l = document.createElement("span");
      l.className = "letter";
      l.textContent = letter;

      btn.append(shape, l);
      btn.addEventListener("click", (ev) => {
        if (btn.classList.contains("revealed")) return;
        btn.classList.add("revealed");
        opened += 1;
        status.textContent = `Нажимай на звезды · ${opened}/${letters.length}`;

        const rect = sky.getBoundingClientRect();
        const sx = ((ev.clientX - rect.left) / rect.width) * 100;
        const sy = ((ev.clientY - rect.top) / rect.height) * 100;

        explode(sx, sy, 28);

        setTimeout(() => {
          spawnComet(i, sx, sy);
          btn.classList.add("hidden");
          setTimeout(() => btn.remove(), 280);
        }, 520);

        if (opened === letters.length) {
          assemblyPending = true;
          assemblyReadyAt = 0;
        }
      });

      sky.appendChild(btn);
      stars.push(btn);
    }

    function spawnComet(index, sx, sy) {
      const el = document.createElement("span");
      el.className = "comet";
      el.style.left = `${sx}%`;
      el.style.top = `${sy}%`;
      sky.appendChild(el);

      const theta = (index / letters.length) * Math.PI * 2;
      const rx = 36 + (index % 3) * 4;
      const ry = 24 + (index % 2) * 3;
      const tx = 50 + Math.cos(theta) * rx;
      const ty = 54 + Math.sin(theta) * ry;

      const dx = tx - sx;
      const dy = ty - sy;
      const d = Math.hypot(dx, dy) || 1;
      const nx = -dy / d;
      const ny = dx / d;
      const arc = (index % 2 === 0 ? 1 : -1) * (8 + (index % 4) * 2.2);
      const txv = -Math.sin(theta) * rx;
      const tyv = Math.cos(theta) * ry;
      const tvd = Math.hypot(txv, tyv) || 1;
      const tnx = txv / tvd;
      const tny = tyv / tvd;
      const tangentLead = 18 + (index % 3) * 2.5;

      const c = {
        idx: index,
        el,
        state: "toOrbit",
        x: sx,
        y: sy,
        prevX: sx,
        prevY: sy,
        lastAngle: 0,
        trail: [],
        lastTrailMs: 0,
        t0: performance.now(),
        dur: 3600 + (index % 3) * 220,
        sx,
        sy,
        c1x: sx + dx * 0.24 + nx * (arc * 1.25),
        c1y: sy + dy * 0.24 + ny * (arc * 1.25),
        c2x: tx - tnx * tangentLead - nx * (arc * 0.25),
        c2y: ty - tny * tangentLead - ny * (arc * 0.25),
        tx,
        ty,
        theta,
        orbitRx: rx,
        orbitRy: ry,
        orbitSpeed: 0.32 + (index % 4) * 0.035,
        toHeartStart: 0,
        toHeartDur: 4300,
        hx1: 0,
        hy1: 0,
        hx2: 0,
        hy2: 0,
        htx: 0,
        hty: 0,
        hpoints: []
      };

      comets.push(c);
      if (!orbitHandle) {
        lastFrame = performance.now();
        orbitHandle = requestAnimationFrame(tick);
      }
    }

    function beginHeartAssembly() {
      if (assembling) return;
      assembling = true;
      arrivedToHeart = 0;
      heartRows = buildHeartRows();
      heartRowCursor = 0;
      revealedHeartRows = new Set();
      heartText.innerHTML = "";
      heartText.classList.remove("show");
      heartText.classList.add("revealing");

      const chunks = makeHeartChunks(comets.length);
      const assigned = assignTargets(comets, chunks);

      comets.forEach((c, i) => {
        const target = assigned[i].anchor;
        const dx = target.x - c.x;
        const dy = target.y - c.y;
        const d = Math.hypot(dx, dy) || 1;
        const nx = -dy / d;
        const ny = dx / d;
        const curve = (i % 2 === 0 ? 1 : -1) * (7 + (i % 3) * 2.1);
        const vx = c.x - c.prevX;
        const vy = c.y - c.prevY;
        const vd = Math.hypot(vx, vy);
        const ux = vd > 0.001 ? vx / vd : -Math.sin(c.theta || 0);
        const uy = vd > 0.001 ? vy / vd : Math.cos(c.theta || 0);
        const departLead = Math.min(30, Math.max(18, d * 0.34));
        const arriveLead = Math.min(24, Math.max(12, d * 0.28));

        c.state = "toHeart";
        c.toHeartStart = performance.now();
        c.toHeartDur = 4600;
        c.sx = c.x;
        c.sy = c.y;
        c.hx1 = c.x + ux * departLead + nx * curve * 0.8;
        c.hy1 = c.y + uy * departLead + ny * curve * 0.8;
        c.hx2 = target.x - (dx / d) * arriveLead - nx * curve * 0.55;
        c.hy2 = target.y - (dy / d) * arriveLead - ny * curve * 0.55;
        c.htx = target.x;
        c.hty = target.y;
        c.hpoints = assigned[i].points;
      });
    }

    function tick(now) {
      const dt = Math.min(0.05, (now - lastFrame) / 1000);
      lastFrame = now;
      let alive = 0;

      comets.forEach((c) => {
        if (c.state === "done") return;
        alive += 1;

        if (c.state === "toOrbit") {
          const t = Math.min(1, (now - c.t0) / c.dur);
          const e = flowEase(t);
          const u = 1 - e;
          c.x = u*u*u*c.sx + 3*u*u*e*c.c1x + 3*u*e*e*c.c2x + e*e*e*c.tx;
          c.y = u*u*u*c.sy + 3*u*u*e*c.c1y + 3*u*e*e*c.c2y + e*e*e*c.ty;
          if (t >= 1) {
            c.state = "orbit";
            c.theta = Math.atan2((c.y - 54) / (c.orbitRy || 1), (c.x - 50) / (c.orbitRx || 1));
          }
        } else if (c.state === "orbit") {
          c.theta += c.orbitSpeed * dt;
          c.x = 50 + Math.cos(c.theta) * c.orbitRx;
          c.y = 54 + Math.sin(c.theta) * c.orbitRy;
        } else if (c.state === "toHeart") {
          const t = Math.min(1, (now - c.toHeartStart) / c.toHeartDur);
          const e = flowEase(t);
          const u = 1 - e;
          c.x = u*u*u*c.sx + 3*u*u*e*c.hx1 + 3*u*e*e*c.hx2 + e*e*e*c.htx;
          c.y = u*u*u*c.sy + 3*u*u*e*c.hy1 + 3*u*e*e*c.hy2 + e*e*e*c.hty;
          if (t >= 1) {
            c.state = "done";
            c.el.remove();
            const ex = c.x;
            const ey = c.y;
            explode(ex, ey, 42);
            revealHeartChunk(c.hpoints, ex, ey);
            arrivedToHeart += 1;
            if (arrivedToHeart === comets.length) {
              heartText.classList.add("show");
              status.textContent = "Я люблю тебя";
            }
          }
        }

        const vx = c.x - c.prevX;
        const vy = c.y - c.prevY;
        const speed = Math.hypot(vx, vy);
        const angRaw = Math.atan2(vy, vx) * 180 / Math.PI;
        const dAng = ((((angRaw - c.lastAngle) + 540) % 360) - 180);
        const ang = c.lastAngle + dAng * 0.25;
        c.lastAngle = ang;

        c.el.style.left = `${c.x}%`;
        c.el.style.top = `${c.y}%`;
        c.el.style.transform = `translate(-50%, -50%) rotate(${ang.toFixed(1)}deg)`;

        if (speed > 0.004 && (now - c.lastTrailMs) > 24) {
          c.trail.push({ x: c.x, y: c.y });
          if (c.trail.length > 20) c.trail.shift();
          renderTrail(c.trail);
          c.lastTrailMs = now;
        }

        c.prevX = c.x;
        c.prevY = c.y;
      });

      if (assemblyPending && !assembling && comets.length === letters.length) {
        const allOrbit = comets.every((c) => c.state === "orbit");
        if (allOrbit) {
          if (!assemblyReadyAt) assemblyReadyAt = now + 1250;
          if (now >= assemblyReadyAt) {
            assemblyPending = false;
            assemblyReadyAt = 0;
            beginHeartAssembly();
          }
        } else {
          assemblyReadyAt = 0;
        }
      }

      if (alive > 0) orbitHandle = requestAnimationFrame(tick);
      else orbitHandle = null;
    }

    function smoother(t) {
      return t*t*t*(t*(6*t - 15) + 10);
    }

    function flowEase(t) {
      return Math.min(1, Math.max(0, 0.72 * t + 0.28 * smoother(t)));
    }

    function renderTrail(trail) {
      const n = trail.length;
      for (let i = 0; i < n; i++) {
        const p = trail[i];
        const k = i / Math.max(1, n - 1);
        const d = document.createElement("span");
        d.className = "trail-dot";
        d.style.left = `${p.x}%`;
        d.style.top = `${p.y}%`;
        d.style.setProperty("--s", `${(4 + k * 16).toFixed(2)}px`);
        d.style.setProperty("--b", `${(0.8 + k * 3.2).toFixed(2)}px`);
        d.style.setProperty("--o", `${(0.08 + k * 0.55).toFixed(3)}`);
        sky.appendChild(d);
        setTimeout(() => d.remove(), 440);
      }
    }

    function explode(x, y, count) {
      const wave = document.createElement("span");
      wave.className = "wave";
      wave.style.left = `${x}%`;
      wave.style.top = `${y}%`;
      sky.appendChild(wave);
      setTimeout(() => wave.remove(), 1450);

      for (let i = 0; i < count; i++) {
        const p = document.createElement("span");
        p.className = "particle";
        p.style.left = `${x}%`;
        p.style.top = `${y}%`;
        const a = Math.random() * Math.PI * 2;
        const r = 26 + Math.random() * 84;
        p.style.setProperty("--dx", `${(Math.cos(a) * r).toFixed(1)}px`);
        p.style.setProperty("--dy", `${(Math.sin(a) * r).toFixed(1)}px`);
        sky.appendChild(p);
        setTimeout(() => p.remove(), 1400);
      }
    }

    function makeHeartChunks(chunkCount) {
      const rows = heartRows.length ? heartRows : buildHeartRows();
      const points = [];

      rows.forEach((row, rowIndex) => {
        const segments = row.segments || [{ center: 50, width: 70 }];
        segments.forEach((segment) => {
          const width = Math.max(3, segment.width);
          const count = Math.max(2, Math.round(width / 8));
          for (let i = 0; i < count; i++) {
            const k = count === 1 ? 0.5 : i / (count - 1);
            points.push({
              x: segment.center - width / 2 + width * k,
              y: row.y,
              row: rowIndex
            });
          }
        });
      });

      const anchors = [];
      const step = Math.max(1, Math.floor(points.length / chunkCount));
      for (let i = 0; i < chunkCount; i++) {
        anchors.push(points[Math.min(points.length - 1, i * step)]);
      }

      const chunks = anchors.map((a) => ({ anchor: { x: a.x, y: a.y }, points: [] }));
      points.forEach((p) => {
        let best = 0;
        let bestDist = Infinity;
        anchors.forEach((a, i) => {
          const d = (p.x - a.x) * (p.x - a.x) + (p.y - a.y) * (p.y - a.y);
          if (d < bestDist) {
            bestDist = d;
            best = i;
          }
        });
        chunks[best].points.push(p);
      });

      return chunks;
    }

    function sparse(points, minDist) {
      const out = [];
      const md2 = minDist * minDist;
      points.forEach((p) => {
        let near = false;
        for (let i = 0; i < out.length; i++) {
          const dx = p.x - out[i].x;
          const dy = p.y - out[i].y;
          if (dx*dx + dy*dy < md2) { near = true; break; }
        }
        if (!near) out.push(p);
      });
      return out;
    }

    function assignTargets(cometsList, chunks) {
      const starsP = cometsList.map((c, i) => ({ i, x: c.x, y: c.y }));
      const targets = chunks.map((c) => ({ x: c.anchor.x, y: c.anchor.y, points: c.points }));
      const out = new Array(cometsList.length);

      starsP.forEach((s) => {
        let bi = 0;
        let bd = Infinity;
        targets.forEach((t, i) => {
          const d = (s.x - t.x)*(s.x - t.x) + (s.y - t.y)*(s.y - t.y);
          if (d < bd) { bd = d; bi = i; }
        });
        const pick = targets.splice(bi, 1)[0];
        out[s.i] = { anchor: { x: pick.x, y: pick.y }, points: pick.points };
      });

      return out;
    }

    function revealHeartChunk(points, ex, ey) {
      const rowsPerBlast = Math.max(3, Math.ceil(heartRows.length / Math.max(1, letters.length)));
      const picked = Array.from(new Set((points || []).map((p) => p.row)))
        .filter((i) => Number.isInteger(i) && !revealedHeartRows.has(i))
        .sort((a, b) => Math.abs(heartRows[a].y - ey) - Math.abs(heartRows[b].y - ey));

      const nearest = heartRows
        .map((row, i) => ({ i, d: Math.abs(row.y - ey) }))
        .filter((row) => !revealedHeartRows.has(row.i) && !picked.includes(row.i))
        .sort((a, b) => a.d - b.d);

      while (picked.length < rowsPerBlast && nearest.length) {
        picked.push(nearest.shift().i);
      }

      picked.sort((a, b) => a - b).forEach((i, order) => {
        const row = heartRows[i];
        const n = document.createElement("span");
        n.className = "heart-line";
        n.textContent = row.text;
        n.dataset.row = i;
        n.style.left = "50%";
        n.style.top = `${row.y}%`;
        const d = Math.hypot(50 - ex, row.y - ey);
        n.style.animationDelay = `${(0.03 + d * 0.012 + order * 0.045).toFixed(3)}s`;
        n.style.fontSize = `${row.size}px`;
        heartText.appendChild(n);
        revealedHeartRows.add(i);
      });
      heartRowCursor = revealedHeartRows.size;
    }

    function buildHeartRows() {
      const phrase = "Я ЛЮБЛЮ ТЕБЯ ";
      const layout = getHeartLayout();
      const cols = layout.cols;
      const sampleRows = layout.sampleRows;
      const visualWidth = layout.visualWidth;
      const rawRows = [];
      let phrasePos = 0;

      for (let r = 0; r < sampleRows; r++) {
        const y = 1.25 - (r / (sampleRows - 1)) * 2.45;
        const mask = [];
        let hasText = false;

        for (let c = 0; c < cols; c++) {
          const x = -1.45 + (c / (cols - 1)) * 2.9;
          const xx = x * 1.03;
          const yy = y * 1.08;
          const f = Math.pow(xx * xx + yy * yy - 1, 3) - xx * xx * Math.pow(yy, 3);
          const inside = f <= 0;
          mask.push(inside);
          hasText = hasText || inside;
        }

        if (!hasText) continue;

        let text = "";
        const segments = [];
        let start = -1;

        for (let c = 0; c < cols; c++) {
          if (mask[c]) {
            text += phrase[phrasePos % phrase.length];
            phrasePos += 1;
            if (start === -1) start = c;
          } else {
            text += " ";
            if (start !== -1) {
              segments.push(makeHeartSegment(start, c - 1, cols, visualWidth));
              start = -1;
            }
          }
        }

        if (start !== -1) {
          segments.push(makeHeartSegment(start, cols - 1, cols, visualWidth));
        }

        rawRows.push({ text, segments });
      }

      const top = layout.top;
      const bottom = layout.bottom;
      return rawRows.map((row, i) => ({
        y: top + (i / Math.max(1, rawRows.length - 1)) * (bottom - top),
        text: row.text,
        size: layout.fontSize,
        segments: row.segments
      }));
    }

    function getHeartLayout() {
      const width = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0, 320);
      const height = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0, 640);
      const portraitPhone = width <= 560 && height > width * 1.12;
      const landscapePhone = height <= 560 && width <= 960;
      const tablet = !portraitPhone && !landscapePhone && width > 560 && width <= 900;
      const fontSize = portraitPhone ? (width < 380 ? 8.8 : 9.6) : landscapePhone ? 8.9 : tablet ? 10.2 : 11.2;
      const visualWidth = portraitPhone ? (width < 380 ? 90 : 92) : landscapePhone ? 88 : tablet ? 92 : 98;
      const usableWidth = width * (portraitPhone ? 0.92 : landscapePhone ? 0.9 : tablet ? 0.94 : 0.96);
      const charWidth = fontSize * (portraitPhone ? 0.68 : 0.66);
      const cols = Math.max(portraitPhone ? 44 : landscapePhone ? 74 : 96, Math.min(184, Math.floor(usableWidth / charWidth)));
      const sampleRows = portraitPhone ? (width < 380 ? 24 : 26) : landscapePhone ? 30 : tablet ? 40 : 42;

      let top = 15.5;
      let bottom = 84.5;
      if (portraitPhone || landscapePhone) {
        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
        const targetRatio = portraitPhone ? 0.72 : 0.42;
        const minHeight = portraitPhone ? 28 : 54;
        const maxHeight = portraitPhone ? 36 : 72;
        const heightPct = clamp(((width * visualWidth / 100) * targetRatio / height) * 100, minHeight, maxHeight);
        const centerY = portraitPhone ? 51 : 50;
        top = centerY - heightPct / 2;
        bottom = centerY + heightPct / 2;
      }

      return { cols, sampleRows, visualWidth, fontSize, top, bottom };
    }

    function makeHeartSegment(start, end, cols, visualWidth) {
      const left = start / cols;
      const right = (end + 1) / cols;
      return {
        center: 50 - visualWidth / 2 + ((left + right) / 2) * visualWidth,
        width: Math.max(2, (right - left) * visualWidth)
      };
    }

    let resizeTimer = 0;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (!heartRows.length || !heartText.children.length) return;

        heartRows = buildHeartRows();
        heartText.querySelectorAll(".heart-line").forEach((line) => {
          const index = Number(line.dataset.row);
          const row = heartRows[index];
          if (!row) {
            line.remove();
            return;
          }

          line.textContent = row.text;
          line.style.top = `${row.y}%`;
          line.style.fontSize = `${row.size}px`;
        });
      }, 160);
    });

    letters.forEach(makeStar);
  </script>
</body>
