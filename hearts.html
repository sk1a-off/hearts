<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ночное сердце</title>
  <style>
    :root {
      --bg-top: #040914;
      --bg-mid: #0a1c3d;
      --bg-bot: #173f79;
      --text: #eaf2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 650px at 18% 20%, rgba(92, 130, 255, .16), transparent 60%),
        radial-gradient(950px 600px at 84% 22%, rgba(105, 205, 255, .14), transparent 60%),
        radial-gradient(1200px 720px at 50% 120%, rgba(98, 140, 240, .34), transparent 64%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 52%, var(--bg-bot));
    }

    .stars-bg,
    .stars-bg::before,
    .stars-bg::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars-bg {
      z-index: 0;
      background-image:
        radial-gradient(1.7px 1.7px at 8% 17%, rgba(255,255,255,.84) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 25% 36%, rgba(255,255,255,.74) 45%, transparent 50%),
        radial-gradient(1.6px 1.6px at 41% 16%, rgba(255,255,255,.76) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 57% 44%, rgba(255,255,255,.72) 45%, transparent 50%),
        radial-gradient(1.7px 1.7px at 72% 20%, rgba(255,255,255,.82) 45%, transparent 50%),
        radial-gradient(1.4px 1.4px at 88% 34%, rgba(255,255,255,.68) 45%, transparent 50%),
        radial-gradient(1.4px 1.4px at 79% 70%, rgba(255,255,255,.66) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 33% 78%, rgba(255,255,255,.7) 45%, transparent 50%);
      animation: sky-twinkle 5.2s ease-in-out infinite alternate;
    }

    .stars-bg::before {
      background-image:
        radial-gradient(1px 1px at 4% 52%, rgba(255,255,255,.55) 45%, transparent 50%),
        radial-gradient(1px 1px at 12% 86%, rgba(210,229,255,.48) 45%, transparent 50%),
        radial-gradient(1px 1px at 18% 64%, rgba(255,255,255,.42) 45%, transparent 50%),
        radial-gradient(1px 1px at 28% 8%, rgba(236,246,255,.6) 45%, transparent 50%),
        radial-gradient(1px 1px at 45% 72%, rgba(255,255,255,.46) 45%, transparent 50%),
        radial-gradient(1px 1px at 64% 62%, rgba(203,225,255,.5) 45%, transparent 50%),
        radial-gradient(1px 1px at 76% 11%, rgba(255,255,255,.52) 45%, transparent 50%),
        radial-gradient(1px 1px at 92% 78%, rgba(227,240,255,.42) 45%, transparent 50%);
      opacity: .9;
      animation: star-drift 42s linear infinite;
    }

    .stars-bg::after {
      background:
        radial-gradient(ellipse at 48% 38%, rgba(185, 218, 255, .12), transparent 32%),
        radial-gradient(ellipse at 30% 58%, rgba(244, 176, 211, .06), transparent 34%),
        linear-gradient(112deg, transparent 8%, rgba(126, 178, 255, .08) 35%, rgba(250, 181, 218, .05) 51%, transparent 72%);
      opacity: .86;
      mix-blend-mode: screen;
    }

    @keyframes sky-twinkle {
      0%, 100% { opacity: .75; }
      50% { opacity: 1; }
    }

    @keyframes star-drift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-18px, 14px, 0); }
    }

    .atmosphere {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .atmosphere::before {
      content: "";
      position: absolute;
      width: 128vw;
      height: 48vh;
      left: -14vw;
      top: 8vh;
      background:
        radial-gradient(ellipse at 26% 42%, rgba(87, 148, 255, .2), transparent 42%),
        radial-gradient(ellipse at 58% 52%, rgba(255, 156, 205, .11), transparent 44%),
        radial-gradient(ellipse at 82% 38%, rgba(127, 236, 255, .09), transparent 36%);
      opacity: .75;
      transform: rotate(-8deg);
      animation: nebula-breathe 24s ease-in-out infinite alternate;
    }

    .atmosphere::after {
      content: "";
      position: absolute;
      left: -12vw;
      right: -12vw;
      bottom: -11vh;
      height: 34vh;
      background:
        radial-gradient(ellipse at 18% 60%, rgba(150, 184, 229, .18), transparent 54%),
        radial-gradient(ellipse at 52% 42%, rgba(230, 242, 255, .13), transparent 50%),
        radial-gradient(ellipse at 84% 65%, rgba(102, 154, 221, .18), transparent 56%);
      opacity: .8;
    }

    .moon {
      position: fixed;
      top: clamp(28px, 8vh, 82px);
      right: clamp(24px, 8vw, 118px);
      width: clamp(58px, 7vw, 96px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.95), rgba(236,244,255,.94) 36%, rgba(184, 207, 237, .88) 100%);
      box-shadow:
        0 0 26px rgba(210, 229, 255, .36),
        0 0 74px rgba(116, 169, 255, .22);
      pointer-events: none;
      z-index: 1;
      opacity: .9;
    }

    .moon::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: inherit;
      background:
        radial-gradient(circle at 30% 34%, rgba(116, 139, 171, .16) 0 7%, transparent 8%),
        radial-gradient(circle at 64% 30%, rgba(116, 139, 171, .12) 0 9%, transparent 10%),
        radial-gradient(circle at 55% 67%, rgba(116, 139, 171, .14) 0 11%, transparent 12%);
      opacity: .85;
    }

    .shooting-star {
      position: fixed;
      width: clamp(78px, 13vw, 150px);
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(234, 246, 255, .12), rgba(255, 255, 255, .88));
      box-shadow: 0 0 10px rgba(185, 220, 255, .58);
      transform: rotate(-28deg);
      transform-origin: right center;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: shooting-star 11s linear infinite;
    }

    .shooting-star::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      transform: translateY(-50%);
      box-shadow: 0 0 12px rgba(220, 238, 255, .9);
    }

    .shooting-star.s1 { top: 18%; left: 92%; animation-delay: 1.8s; }
    .shooting-star.s2 { top: 34%; left: 104%; animation-delay: 6.4s; animation-duration: 14s; }
    .shooting-star.s3 { top: 10%; left: 76%; animation-delay: 10.2s; animation-duration: 16s; }

    @keyframes nebula-breathe {
      0% { opacity: .52; transform: translate3d(-1.5vw, -1vh, 0) rotate(-8deg); }
      100% { opacity: .82; transform: translate3d(1.5vw, 1vh, 0) rotate(-6deg); }
    }

    @keyframes shooting-star {
      0%, 70% { opacity: 0; transform: translate3d(0, 0, 0) rotate(-28deg); }
      73% { opacity: .95; }
      84% { opacity: .72; }
      100% { opacity: 0; transform: translate3d(-82vw, 48vh, 0) rotate(-28deg); }
    }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 2;
    }

    .fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .star {
      position: absolute;
      width: clamp(62px, 10vw, 88px);
      aspect-ratio: 1;
      border: none;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 4;
      -webkit-tap-highlight-color: transparent;
    }

    .star-shape {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(3.1rem, 9.8vw, 4.2rem);
      color: #e8f3ff;
      text-shadow:
        0 0 10px rgba(198, 219, 246, .86),
        0 0 22px rgba(150, 184, 226, .58),
        0 0 38px rgba(125, 162, 207, .36);
      animation: star-breathe 2.8s ease-in-out infinite;
    }

    .star .letter {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1.55em;
      height: 1.55em;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(.9rem, 3.2vw, 1.05rem);
      line-height: 1;
      color: #152747;
      opacity: 0;
      transform: translate(-50%, calc(-50% + 8px));
      transition: opacity .4s ease, transform .4s ease;
    }

    .star.revealed .letter {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .star.revealed .star-shape {
      animation: star-pop .56s ease forwards;
      color: #f4d98f;
    }

    .star.hidden { opacity: 0; pointer-events: none; transition: opacity .28s ease; }

    @keyframes star-breathe {
      0%, 100% { transform: scale(.98); }
      50% { transform: scale(1.08); }
    }

    @keyframes star-pop {
      0% { transform: scale(1); }
      35% { transform: scale(1.34); filter: brightness(1.2); }
      100% { transform: scale(1.05); }
    }

    .comet {
      position: absolute;
      width: clamp(22px, 5.4vw, 28px);
      height: clamp(22px, 5.4vw, 28px);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 33% 30%, #ffffff 0%, #e6f2ff 32%, #bad2ef 72%, rgba(145, 174, 214, .2) 100%);
      box-shadow: 0 0 14px rgba(196, 220, 249, .8), 0 0 34px rgba(151, 187, 231, .4);
      z-index: 6;
      pointer-events: none;
    }

    .trail-dot {
      position: absolute;
      width: var(--s, 10px);
      height: var(--s, 10px);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(222,236,255,.9), rgba(168,197,234,.45) 55%, rgba(141,171,214,0) 100%);
      filter: blur(var(--b, 2px));
      opacity: var(--o, .4);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 5;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #f7fbff 0%, #cfe0f7 58%, #94b2d8 100%);
      box-shadow: 0 0 10px rgba(175, 203, 237, .6);
      animation: particle-fly 1350ms cubic-bezier(.14,.64,.2,1) forwards;
      z-index: 7;
      pointer-events: none;
    }

    @keyframes particle-fly {
      0% { opacity: .95; transform: translate(-50%, -50%) scale(.72); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.06); }
    }

    .heart-text {
      position: absolute;
      inset: 0;
      transform-origin: 50% 52%;
      opacity: 0;
      pointer-events: none;
      z-index: 3;
      transition: opacity 900ms ease;
    }

    .heart-mask-layer {
      --heart-mask-w: 90%;
      --heart-mask-h: 42%;
      --heart-mask-y: 51%;
      --heart-mask-url: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2090'%3E%3Cpath%20fill='white'%20d='M50%2082C20%2060%205%2044%205%2025C5%2011%2016%204%2029%204C39%204%2047%2010%2050%2019C53%2010%2061%204%2071%204C84%204%2095%2011%2095%2025C95%2044%2080%2060%2050%2082Z'/%3E%3C/svg%3E");
      position: absolute;
      left: 50%;
      top: var(--heart-mask-y);
      width: var(--heart-mask-w);
      height: var(--heart-mask-h);
      transform: translate(-50%, -50%);
      transform-origin: 50% 50%;
      filter: brightness(1) saturate(1) hue-rotate(0deg) drop-shadow(0 0 13px rgba(153, 52, 72, .35));
      -webkit-mask-image: var(--heart-mask-url);
      mask-image: var(--heart-mask-url);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      -webkit-mask-position: center;
      mask-position: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .heart-text.revealing,
    .heart-text.show {
      opacity: 1;
    }

    .heart-text.show {
      will-change: opacity;
    }

    .heart-text.show .heart-mask-layer {
      animation: heart-mask-pulse 6800ms cubic-bezier(.45, 0, .2, 1) 500ms infinite;
      will-change: transform;
    }

    .heart-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .heart-row {
      fill: #f3a4bd;
      font-family: "DejaVu Sans Mono", "Cascadia Mono", "SFMono-Regular", "Courier New", monospace;
      font-weight: 900;
      letter-spacing: .03em;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: svg-line-reveal 1600ms cubic-bezier(.2,.72,.2,1) forwards;
      paint-order: stroke fill;
      stroke: rgba(255, 210, 224, .16);
      stroke-width: .25px;
    }

    .heart-text.show .heart-row {
      opacity: 1;
      animation: heart-row-color 7600ms ease-in-out 500ms infinite;
    }

    .heart-line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: #f3a4bd;
      font-family: "DejaVu Sans Mono", "Cascadia Mono", "SFMono-Regular", "Courier New", monospace;
      font-weight: 900;
      letter-spacing: .03em;
      font-size: clamp(8.6px, .9vw, 11.6px);
      white-space: pre;
      text-transform: uppercase;
      opacity: 0;
      animation: line-reveal 1600ms cubic-bezier(.2,.72,.2,1) forwards;
      text-shadow:
        0 0 5px rgba(255, 187, 207, .26),
        0 0 14px rgba(206, 87, 124, .16);
    }

    .wave {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid rgba(224, 171, 195, .72);
      box-shadow: 0 0 10px rgba(224, 171, 195, .35);
      transform: translate(-50%, -50%);
      animation: wave-expand 1400ms cubic-bezier(.14,.64,.2,1) forwards;
      z-index: 7;
      pointer-events: none;
    }

    @keyframes line-reveal {
      0% { opacity: 0; transform: translateX(-50%) scale(.96); }
      55% { opacity: 1; transform: translateX(-50%) scale(1.006); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    @keyframes svg-line-reveal {
      0% { opacity: 0; transform: scale(.94); }
      60% { opacity: 1; transform: scale(1.008); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes wave-expand {
      0% { opacity: .9; transform: translate(-50%, -50%) scale(.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(8.5); }
    }

    @keyframes heart-mask-pulse {
      0%, 100% {
        transform: translate3d(-50%, -50%, 0) scale(1);
      }
      18% {
        transform: translate3d(-50%, -50%, 0) scale(1.012);
      }
      42% {
        transform: translate3d(-50%, -50%, 0) scale(1.038);
      }
      62% {
        transform: translate3d(-50%, -50%, 0) scale(1.052);
      }
      82% {
        transform: translate3d(-50%, -50%, 0) scale(1.014);
      }
    }

    @keyframes heart-row-color {
      0%, 100% { fill: #f3a4bd; }
      24% { fill: #f8b3c8; }
      48% { fill: #ffd0dc; }
      68% { fill: #ffc3d3; }
      86% { fill: #f6aebf; }
    }

    .status {
      position: fixed;
      left: 50%;
      bottom: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: #edf6ff;
      font-weight: 700;
      letter-spacing: .4px;
      text-shadow: 0 2px 8px rgba(17, 28, 49, .55);
      background: rgba(8, 19, 37, .4);
      border: 1px solid rgba(178, 203, 236, .32);
      border-radius: 999px;
      padding: 8px 16px;
      max-width: calc(100vw - 24px);
      white-space: nowrap;
      font-size: clamp(12px, 3.6vw, 16px);
      backdrop-filter: blur(7px);
      z-index: 20;
    }

    .quality-toggle {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 21;
      color: #eaf2ff;
      font: 700 clamp(11px, 3.2vw, 14px)/1 "Segoe UI", sans-serif;
      letter-spacing: .2px;
      background: rgba(8, 19, 37, .42);
      border: 1px solid rgba(178, 203, 236, .32);
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      backdrop-filter: blur(7px);
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes heart-mask-pulse-mobile {
      0%, 100% {
        transform: translate3d(-50%, -50%, 0) scale(1);
        filter: none;
      }
      24% {
        transform: translate3d(-50%, -50%, 0) scale(1.012);
        filter: none;
      }
      52% {
        transform: translate3d(-50%, -50%, 0) scale(1.042);
        filter: none;
      }
      76% {
        transform: translate3d(-50%, -50%, 0) scale(1.014);
        filter: none;
      }
    }

    @keyframes heart-row-color-mobile {
      0%, 100% { fill: #f3a4bd; }
      28% { fill: #f8b3c8; }
      52% { fill: #ffd0dc; }
      76% { fill: #f7b6c2; }
    }

    @media (max-width: 560px), (hover: none) and (pointer: coarse) {
      .stars-bg::before {
        animation: none;
        opacity: .58;
      }

      .atmosphere::before {
        animation: none;
        opacity: .38;
      }

      .atmosphere::after {
        opacity: .45;
      }

      .moon {
        top: 34px;
        right: 24px;
        width: 54px;
        opacity: .7;
        box-shadow: 0 0 22px rgba(210, 229, 255, .24);
      }

      .shooting-star {
        display: none;
      }

      .shooting-star.s1 {
        display: block;
        animation-duration: 18s;
      }

      .comet {
        box-shadow: 0 0 10px rgba(196, 220, 249, .62), 0 0 20px rgba(151, 187, 231, .24);
      }

      .trail-dot {
        filter: none;
        mix-blend-mode: normal;
      }

      .particle {
        width: 4px;
        height: 4px;
        box-shadow: none;
        animation-duration: 900ms;
      }

      .wave {
        box-shadow: none;
        animation-duration: 1000ms;
      }

      .heart-mask-layer {
        filter: none;
      }

      .heart-text.show .heart-mask-layer {
        animation: heart-mask-pulse-mobile 7200ms cubic-bezier(.45, 0, .2, 1) 500ms infinite;
      }

      .star .letter {
        top: 50.5%;
        font-size: clamp(.86rem, 3.6vw, 1rem);
      }

      .heart-line {
        letter-spacing: .005em;
        text-shadow: 0 0 4px rgba(210, 110, 140, .18);
      }

      .heart-row {
        letter-spacing: .005em;
        stroke-width: 0;
      }

      .heart-text.show .heart-row {
        animation: heart-row-color-mobile 7800ms ease-in-out 500ms infinite;
        opacity: 1;
      }

      .status {
        backdrop-filter: none;
        background: rgba(8, 19, 37, .66);
      }

      .quality-toggle {
        right: 10px;
        bottom: calc(58px + env(safe-area-inset-bottom));
        padding: 8px 11px;
        backdrop-filter: none;
        background: rgba(8, 19, 37, .66);
      }
    }

    body[data-quality="smooth"] .shooting-star:not(.s1) {
      display: none;
    }

    body[data-quality="smooth"] .stars-bg::before,
    body[data-quality="smooth"] .atmosphere::before {
      animation: none;
    }

    body[data-quality="smooth"] .quality-toggle {
      background: rgba(18, 38, 70, .72);
    }

    @media (max-width: 560px), (hover: none) and (pointer: coarse) {
      body[data-quality="beauty"] .shooting-star {
        display: block;
      }

      body[data-quality="beauty"] .atmosphere::before {
        animation: nebula-breathe 24s ease-in-out infinite alternate;
      }
    }
  </style>
</head>
<body>
  <div class="stars-bg" aria-hidden="true"></div>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>
  <span class="shooting-star s1" aria-hidden="true"></span>
  <span class="shooting-star s2" aria-hidden="true"></span>
  <span class="shooting-star s3" aria-hidden="true"></span>
  <main class="sky" id="sky" aria-label="Небо"></main>
  <canvas class="fx-canvas" id="fxCanvas" aria-hidden="true"></canvas>
  <section class="heart-text" id="heartText" aria-label="Сердце из текста"></section>
  <div class="status" id="status">Нажимай на звезды · 0/10</div>
  <button class="quality-toggle" id="qualityToggle" type="button" aria-label="Переключить качество">Режим: Плавно</button>

  <script>
    const letters = ["Я", "Л", "Ю", "Б", "Л", "Ю", "Т", "Е", "Б", "Я"];
    const positions = [
      [6, 10], [19, 28], [33, 14], [48, 38], [63, 20],
      [79, 46], [92, 26], [74, 66], [52, 84], [14, 74]
    ];

    const sky = document.getElementById("sky");
    const status = document.getElementById("status");
    const heartText = document.getElementById("heartText");
    const fxCanvas = document.getElementById("fxCanvas");
    const fxCtx = fxCanvas.getContext("2d");
    const qualityToggle = document.getElementById("qualityToggle");

    let opened = 0;
    let assembling = false;
    let assemblyPending = false;
    let assemblyReadyAt = 0;
    let orbitHandle = null;
    let lastFrame = performance.now();
    let arrivedToHeart = 0;
    let heartRows = [];
    let heartRowCursor = 0;
    let revealedHeartRows = new Set();
    let heartMaskLayer = null;
    let heartRowsLayer = null;
    let fxW = 0;
    let fxH = 0;
    let fxDpr = 1;
    let fxHandle = null;
    let fxLastFrame = performance.now();

    const stars = [];
    const comets = [];
    const fxParticles = [];
    const coarsePointerQuery = window.matchMedia ? window.matchMedia("(hover: none) and (pointer: coarse)") : null;
    let qualityMode = "smooth";
    let lowPowerMode = false;

    function makeStar(letter, i) {
      const btn = document.createElement("button");
      btn.className = "star";
      btn.type = "button";
      btn.style.left = `${positions[i][0]}%`;
      btn.style.top = `${positions[i][1]}%`;
      btn.setAttribute("aria-label", `Звезда ${i + 1}`);

      const shape = document.createElement("span");
      shape.className = "star-shape";
      shape.textContent = "✦";

      const l = document.createElement("span");
      l.className = "letter";
      l.textContent = letter;

      btn.append(shape, l);
      btn.addEventListener("click", (ev) => {
        if (btn.classList.contains("revealed")) return;
        btn.classList.add("revealed");
        opened += 1;
        status.textContent = `Нажимай на звезды · ${opened}/${letters.length}`;

        const rect = sky.getBoundingClientRect();
        const sx = ((ev.clientX - rect.left) / rect.width) * 100;
        const sy = ((ev.clientY - rect.top) / rect.height) * 100;

        explode(sx, sy, 28);

        setTimeout(() => {
          spawnComet(i, sx, sy);
          btn.classList.add("hidden");
          setTimeout(() => btn.remove(), 280);
        }, 520);

        if (opened === letters.length) {
          assemblyPending = true;
          assemblyReadyAt = 0;
        }
      });

      sky.appendChild(btn);
      stars.push(btn);
    }

    function spawnComet(index, sx, sy) {
      const el = document.createElement("span");
      el.className = "comet";
      el.style.left = `${sx}%`;
      el.style.top = `${sy}%`;
      sky.appendChild(el);

      const theta = (index / letters.length) * Math.PI * 2;
      const rx = 36 + (index % 3) * 4;
      const ry = 24 + (index % 2) * 3;
      const tx = 50 + Math.cos(theta) * rx;
      const ty = 54 + Math.sin(theta) * ry;

      const dx = tx - sx;
      const dy = ty - sy;
      const d = Math.hypot(dx, dy) || 1;
      const nx = -dy / d;
      const ny = dx / d;
      const arc = (index % 2 === 0 ? 1 : -1) * (8 + (index % 4) * 2.2);
      const txv = -Math.sin(theta) * rx;
      const tyv = Math.cos(theta) * ry;
      const tvd = Math.hypot(txv, tyv) || 1;
      const tnx = txv / tvd;
      const tny = tyv / tvd;
      const tangentLead = 18 + (index % 3) * 2.5;

      const c = {
        idx: index,
        el,
        state: "toOrbit",
        x: sx,
        y: sy,
        prevX: sx,
        prevY: sy,
        lastAngle: 0,
        trail: [],
        lastTrailMs: 0,
        t0: performance.now(),
        dur: 3600 + (index % 3) * 220,
        sx,
        sy,
        c1x: sx + dx * 0.24 + nx * (arc * 1.25),
        c1y: sy + dy * 0.24 + ny * (arc * 1.25),
        c2x: tx - tnx * tangentLead - nx * (arc * 0.25),
        c2y: ty - tny * tangentLead - ny * (arc * 0.25),
        tx,
        ty,
        theta,
        orbitRx: rx,
        orbitRy: ry,
        orbitSpeed: 0.32 + (index % 4) * 0.035,
        toHeartStart: 0,
        toHeartDur: 4300,
        hx1: 0,
        hy1: 0,
        hx2: 0,
        hy2: 0,
        htx: 0,
        hty: 0,
        hpoints: []
      };

      comets.push(c);
      if (!orbitHandle) {
        lastFrame = performance.now();
        orbitHandle = requestAnimationFrame(tick);
      }
    }

    function beginHeartAssembly() {
      if (assembling) return;
      assembling = true;
      arrivedToHeart = 0;
      heartRowCursor = 0;
      revealedHeartRows = new Set();
      heartText.classList.remove("show");
      resetHeartSvg();
      heartRows = buildHeartRows();
      heartText.classList.add("revealing");

      const chunks = makeHeartChunks(comets.length);
      const assigned = assignTargets(comets, chunks);

      comets.forEach((c, i) => {
        const target = assigned[i].anchor;
        const dx = target.x - c.x;
        const dy = target.y - c.y;
        const d = Math.hypot(dx, dy) || 1;
        const nx = -dy / d;
        const ny = dx / d;
        const curve = (i % 2 === 0 ? 1 : -1) * (7 + (i % 3) * 2.1);
        const vx = c.x - c.prevX;
        const vy = c.y - c.prevY;
        const vd = Math.hypot(vx, vy);
        const ux = vd > 0.001 ? vx / vd : -Math.sin(c.theta || 0);
        const uy = vd > 0.001 ? vy / vd : Math.cos(c.theta || 0);
        const departLead = Math.min(30, Math.max(18, d * 0.34));
        const arriveLead = Math.min(24, Math.max(12, d * 0.28));

        c.state = "toHeart";
        c.toHeartStart = performance.now();
        c.toHeartDur = 4600;
        c.sx = c.x;
        c.sy = c.y;
        c.hx1 = c.x + ux * departLead + nx * curve * 0.8;
        c.hy1 = c.y + uy * departLead + ny * curve * 0.8;
        c.hx2 = target.x - (dx / d) * arriveLead - nx * curve * 0.55;
        c.hy2 = target.y - (dy / d) * arriveLead - ny * curve * 0.55;
        c.htx = target.x;
        c.hty = target.y;
        c.hpoints = assigned[i].points;
      });
    }

    function tick(now) {
      const dt = Math.min(0.05, (now - lastFrame) / 1000);
      const lowPower = lowPowerMode;
      const trailInterval = lowPower ? 150 : 56;
      const maxTrail = lowPower ? 5 : 14;
      lastFrame = now;
      let alive = 0;

      comets.forEach((c) => {
        if (c.state === "done") return;
        alive += 1;

        if (c.state === "toOrbit") {
          const t = Math.min(1, (now - c.t0) / c.dur);
          const e = flowEase(t);
          const u = 1 - e;
          c.x = u*u*u*c.sx + 3*u*u*e*c.c1x + 3*u*e*e*c.c2x + e*e*e*c.tx;
          c.y = u*u*u*c.sy + 3*u*u*e*c.c1y + 3*u*e*e*c.c2y + e*e*e*c.ty;
          if (t >= 1) {
            c.state = "orbit";
            c.theta = Math.atan2((c.y - 54) / (c.orbitRy || 1), (c.x - 50) / (c.orbitRx || 1));
          }
        } else if (c.state === "orbit") {
          c.theta += c.orbitSpeed * dt;
          c.x = 50 + Math.cos(c.theta) * c.orbitRx;
          c.y = 54 + Math.sin(c.theta) * c.orbitRy;
        } else if (c.state === "toHeart") {
          const t = Math.min(1, (now - c.toHeartStart) / c.toHeartDur);
          const e = flowEase(t);
          const u = 1 - e;
          c.x = u*u*u*c.sx + 3*u*u*e*c.hx1 + 3*u*e*e*c.hx2 + e*e*e*c.htx;
          c.y = u*u*u*c.sy + 3*u*u*e*c.hy1 + 3*u*e*e*c.hy2 + e*e*e*c.hty;
          if (t >= 1) {
            c.state = "done";
            c.el.remove();
            const ex = c.x;
            const ey = c.y;
            explode(ex, ey, 42);
            revealHeartChunk(c.hpoints, ex, ey);
            arrivedToHeart += 1;
            if (arrivedToHeart === comets.length) {
              heartText.classList.add("show");
              status.textContent = "Я люблю тебя";
            }
          }
        }

        const vx = c.x - c.prevX;
        const vy = c.y - c.prevY;
        const speed = Math.hypot(vx, vy);
        const angRaw = Math.atan2(vy, vx) * 180 / Math.PI;
        const dAng = ((((angRaw - c.lastAngle) + 540) % 360) - 180);
        const ang = c.lastAngle + dAng * 0.25;
        c.lastAngle = ang;

        c.el.style.left = `${c.x}%`;
        c.el.style.top = `${c.y}%`;
        c.el.style.transform = `translate(-50%, -50%) rotate(${ang.toFixed(1)}deg)`;

        const shouldRenderTrail = !lowPower || c.state !== "orbit";
        if (shouldRenderTrail && speed > 0.004 && (now - c.lastTrailMs) > trailInterval) {
          c.trail.push({ x: c.x, y: c.y });
          if (c.trail.length > maxTrail) c.trail.shift();
          renderTrail(c.trail, lowPower);
          c.lastTrailMs = now;
        }

        c.prevX = c.x;
        c.prevY = c.y;
      });

      if (assemblyPending && !assembling && comets.length === letters.length) {
        const allOrbit = comets.every((c) => c.state === "orbit");
        if (allOrbit) {
          if (!assemblyReadyAt) assemblyReadyAt = now + 1250;
          if (now >= assemblyReadyAt) {
            assemblyPending = false;
            assemblyReadyAt = 0;
            beginHeartAssembly();
          }
        } else {
          assemblyReadyAt = 0;
        }
      }

      if (alive > 0) orbitHandle = requestAnimationFrame(tick);
      else orbitHandle = null;
    }

    function smoother(t) {
      return t*t*t*(t*(6*t - 15) + 10);
    }

    function flowEase(t) {
      return Math.min(1, Math.max(0, 0.72 * t + 0.28 * smoother(t)));
    }

    function initQualityMode() {
      let saved = "";
      try {
        saved = localStorage.getItem("loveQuality") || "";
      } catch (_) {
        saved = "";
      }
      const coarsePointer = coarsePointerQuery ? coarsePointerQuery.matches : false;
      qualityMode = saved || (coarsePointer ? "smooth" : "beauty");
      applyQualityMode();
    }

    function applyQualityMode() {
      document.body.dataset.quality = qualityMode;
      qualityToggle.textContent = `Режим: ${qualityMode === "smooth" ? "Плавно" : "Красиво"}`;
      qualityToggle.setAttribute("aria-pressed", qualityMode === "smooth" ? "true" : "false");
      updateLowPowerMode();
      resizeFxCanvas();
    }

    qualityToggle.addEventListener("click", () => {
      qualityMode = qualityMode === "smooth" ? "beauty" : "smooth";
      try {
        localStorage.setItem("loveQuality", qualityMode);
      } catch (_) {}
      applyQualityMode();
    });

    function updateLowPowerMode() {
      lowPowerMode = qualityMode === "smooth";
      return lowPowerMode;
    }

    function resizeFxCanvas() {
      fxW = window.innerWidth || document.documentElement.clientWidth || 320;
      fxH = window.innerHeight || document.documentElement.clientHeight || 640;
      fxDpr = Math.min(window.devicePixelRatio || 1, lowPowerMode ? 1.35 : 2);
      fxCanvas.width = Math.ceil(fxW * fxDpr);
      fxCanvas.height = Math.ceil(fxH * fxDpr);
      fxCanvas.style.width = `${fxW}px`;
      fxCanvas.style.height = `${fxH}px`;
      fxCtx.setTransform(fxDpr, 0, 0, fxDpr, 0, 0);
    }

    function percentToCanvas(x, y) {
      return { x: x * fxW / 100, y: y * fxH / 100 };
    }

    function addFxParticle(particle) {
      fxParticles.push(particle);
      if (!fxHandle) {
        fxLastFrame = performance.now();
        fxHandle = requestAnimationFrame(tickFx);
      }
    }

    function tickFx(now) {
      const dt = Math.min(0.04, (now - fxLastFrame) / 1000);
      fxLastFrame = now;
      fxCtx.clearRect(0, 0, fxW, fxH);

      for (let i = fxParticles.length - 1; i >= 0; i--) {
        const p = fxParticles[i];
        p.age += dt;
        if (p.age >= p.life) {
          fxParticles.splice(i, 1);
          continue;
        }

        p.x += (p.vx || 0) * dt;
        p.y += (p.vy || 0) * dt;
        p.vx *= p.drag || 1;
        p.vy *= p.drag || 1;

        const k = p.age / p.life;
        const alpha = (p.alpha || 1) * (1 - k);
        const size = p.size * (p.grow ? 1 + k * p.grow : 1);

        fxCtx.globalAlpha = alpha;
        fxCtx.fillStyle = p.color;
        if (!lowPowerMode && p.glow) {
          fxCtx.shadowColor = p.color;
          fxCtx.shadowBlur = p.glow;
        } else {
          fxCtx.shadowBlur = 0;
        }
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
        fxCtx.fill();
      }

      fxCtx.globalAlpha = 1;
      fxCtx.shadowBlur = 0;
      fxCtx.shadowColor = "transparent";

      if (fxParticles.length) fxHandle = requestAnimationFrame(tickFx);
      else fxHandle = null;
    }

    function renderTrail(trail, lowPower) {
      const n = trail.length;
      const start = lowPower ? n - 1 : Math.max(0, n - 4);

      for (let i = start; i < n; i++) {
        const p = trail[i];
        const k = lowPower ? 1 : i / Math.max(1, n - 1);
        const pt = percentToCanvas(p.x, p.y);
        addFxParticle({
          x: pt.x,
          y: pt.y,
          vx: 0,
          vy: 0,
          age: 0,
          life: lowPower ? 0.36 : 0.55,
          size: lowPower ? 4.8 + k * 5.2 : 3 + k * 9,
          grow: lowPower ? 0.25 : 0.5,
          alpha: lowPower ? 0.2 : 0.34 + k * 0.2,
          color: lowPower ? "rgba(203,226,255,.72)" : "rgba(216,235,255,.82)",
          glow: lowPower ? 0 : 12,
          drag: 1
        });
      }
    }

    function explode(x, y, count) {
      const lowPower = lowPowerMode;
      const particleCount = lowPower ? Math.min(count, count > 30 ? 14 : 9) : count;
      const particleLife = lowPower ? 0.82 : 1.25;
      const minSpeed = lowPower ? 28 : 40;
      const speedSpread = lowPower ? 80 : 150;
      const center = percentToCanvas(x, y);
      const wave = document.createElement("span");
      wave.className = "wave";
      wave.style.left = `${x}%`;
      wave.style.top = `${y}%`;
      sky.appendChild(wave);
      setTimeout(() => wave.remove(), 1450);

      for (let i = 0; i < particleCount; i++) {
        const a = Math.random() * Math.PI * 2;
        const speed = minSpeed + Math.random() * speedSpread;
        addFxParticle({
          x: center.x,
          y: center.y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          age: 0,
          life: particleLife * (0.72 + Math.random() * 0.46),
          size: lowPower ? 2.2 + Math.random() * 2.6 : 2.6 + Math.random() * 3.8,
          grow: lowPower ? 0.15 : 0.3,
          alpha: lowPower ? 0.72 : 0.9,
          color: Math.random() > 0.35 ? "rgba(242,248,255,.95)" : "rgba(255,198,220,.9)",
          glow: lowPower ? 0 : 11,
          drag: 0.985
        });
      }
    }

    function makeHeartChunks(chunkCount) {
      const rows = heartRows.length ? heartRows : buildHeartRows();
      const points = [];

      rows.forEach((row, rowIndex) => {
        const segments = row.segments || [{ center: 50, width: 70 }];
        segments.forEach((segment) => {
          const width = Math.max(3, segment.width);
          const count = Math.max(2, Math.round(width / 8));
          for (let i = 0; i < count; i++) {
            const k = count === 1 ? 0.5 : i / (count - 1);
            points.push({
              x: segment.center - width / 2 + width * k,
              y: row.y,
              row: rowIndex
            });
          }
        });
      });

      const anchors = [];
      const step = Math.max(1, Math.floor(points.length / chunkCount));
      for (let i = 0; i < chunkCount; i++) {
        anchors.push(points[Math.min(points.length - 1, i * step)]);
      }

      const chunks = anchors.map((a) => ({ anchor: { x: a.x, y: a.y }, points: [] }));
      points.forEach((p) => {
        let best = 0;
        let bestDist = Infinity;
        anchors.forEach((a, i) => {
          const d = (p.x - a.x) * (p.x - a.x) + (p.y - a.y) * (p.y - a.y);
          if (d < bestDist) {
            bestDist = d;
            best = i;
          }
        });
        chunks[best].points.push(p);
      });

      return chunks;
    }

    function sparse(points, minDist) {
      const out = [];
      const md2 = minDist * minDist;
      points.forEach((p) => {
        let near = false;
        for (let i = 0; i < out.length; i++) {
          const dx = p.x - out[i].x;
          const dy = p.y - out[i].y;
          if (dx*dx + dy*dy < md2) { near = true; break; }
        }
        if (!near) out.push(p);
      });
      return out;
    }

    function assignTargets(cometsList, chunks) {
      const starsP = cometsList.map((c, i) => ({ i, x: c.x, y: c.y }));
      const targets = chunks.map((c) => ({ x: c.anchor.x, y: c.anchor.y, points: c.points }));
      const out = new Array(cometsList.length);

      starsP.forEach((s) => {
        let bi = 0;
        let bd = Infinity;
        targets.forEach((t, i) => {
          const d = (s.x - t.x)*(s.x - t.x) + (s.y - t.y)*(s.y - t.y);
          if (d < bd) { bd = d; bi = i; }
        });
        const pick = targets.splice(bi, 1)[0];
        out[s.i] = { anchor: { x: pick.x, y: pick.y }, points: pick.points };
      });

      return out;
    }

    function resetHeartSvg() {
      const svgNS = "http://www.w3.org/2000/svg";
      heartText.innerHTML = "";
      heartMaskLayer = document.createElement("div");
      heartMaskLayer.className = "heart-mask-layer";

      const svg = document.createElementNS(svgNS, "svg");
      svg.classList.add("heart-svg");
      svg.setAttribute("aria-hidden", "true");
      svg.setAttribute("focusable", "false");

      heartRowsLayer = document.createElementNS(svgNS, "g");
      heartRowsLayer.classList.add("heart-rows");
      svg.appendChild(heartRowsLayer);
      heartMaskLayer.appendChild(svg);
      heartText.appendChild(heartMaskLayer);
    }

    function revealHeartChunk(points, ex, ey) {
      const rowsPerBlast = Math.max(3, Math.ceil(heartRows.length / Math.max(1, letters.length)));
      const picked = Array.from(new Set((points || []).map((p) => p.row)))
        .filter((i) => Number.isInteger(i) && !revealedHeartRows.has(i))
        .sort((a, b) => Math.abs(heartRows[a].y - ey) - Math.abs(heartRows[b].y - ey));

      const nearest = heartRows
        .map((row, i) => ({ i, d: Math.abs(row.y - ey) }))
        .filter((row) => !revealedHeartRows.has(row.i) && !picked.includes(row.i))
        .sort((a, b) => a.d - b.d);

      while (picked.length < rowsPerBlast && nearest.length) {
        picked.push(nearest.shift().i);
      }

      picked.sort((a, b) => a - b).forEach((i, order) => {
        const row = heartRows[i];
        const n = document.createElementNS("http://www.w3.org/2000/svg", "text");
        n.classList.add("heart-row");
        n.textContent = row.text;
        n.dataset.row = i;
        n.setAttribute("x", "50%");
        n.setAttribute("y", `${row.localY ?? row.y}%`);
        const d = Math.hypot(50 - ex, row.y - ey);
        n.style.animationDelay = `${(0.03 + d * 0.012 + order * 0.045).toFixed(3)}s`;
        n.style.fontSize = `${row.size}px`;
        (heartRowsLayer || heartText).appendChild(n);
        revealedHeartRows.add(i);
      });
      heartRowCursor = revealedHeartRows.size;
    }

    function buildHeartRows() {
      const phrase = "Я ЛЮБЛЮ ТЕБЯ ";
      const layout = getHeartLayout();
      const rows = [];
      let phrasePos = 0;

      applyHeartMaskLayout(layout);

      const makeText = (len) => {
        let text = "";
        for (let i = 0; i < len; i++) {
          text += phrase[phrasePos % phrase.length];
          phrasePos += 1;
        }
        return text;
      };

      for (let r = 0; r < layout.sampleRows; r++) {
        const progress = r / Math.max(1, layout.sampleRows - 1);
        const y = layout.top + progress * (layout.bottom - layout.top);
        const curveY = 1.25 - progress * 2.45;
        const localY = 6 + progress * 88;

        rows.push({
          y,
          localY,
          text: makeText(layout.cols),
          size: layout.fontSize,
          segments: makeImplicitHeartSegments(curveY, layout.visualWidth)
        });
      }

      return rows;
    }

    function applyHeartMaskLayout(layout) {
      const target = heartMaskLayer || heartText;
      target.style.setProperty("--heart-mask-w", `${layout.visualWidth}%`);
      target.style.setProperty("--heart-mask-h", `${(layout.bottom - layout.top).toFixed(2)}%`);
      target.style.setProperty("--heart-mask-y", `${((layout.top + layout.bottom) / 2).toFixed(2)}%`);
    }

    function makeImplicitHeartSegments(curveY, visualWidth) {
      const sampleCols = 140;
      const segments = [];
      let start = -1;

      for (let c = 0; c < sampleCols; c++) {
        const x = -1.45 + (c / (sampleCols - 1)) * 2.9;
        const xx = x * 1.03;
        const yy = curveY * 1.08;
        const f = Math.pow(xx * xx + yy * yy - 1, 3) - xx * xx * Math.pow(yy, 3);
        const inside = f <= 0.025;

        if (inside && start === -1) start = c;
        if ((!inside || c === sampleCols - 1) && start !== -1) {
          const end = inside && c === sampleCols - 1 ? c : c - 1;
          segments.push(makeHeartSegment(start, end, sampleCols, visualWidth));
          start = -1;
        }
      }

      return segments.length ? segments : [{ center: 50, width: 2 }];
    }

    function getHeartLayout() {
      const width = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0, 320);
      const height = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0, 640);
      const portraitPhone = width <= 560 && height > width * 1.12;
      const landscapePhone = height <= 560 && width <= 960;
      const tablet = !portraitPhone && !landscapePhone && width > 560 && width <= 900;
      const fontSize = portraitPhone ? (width < 380 ? 9.1 : 10) : landscapePhone ? 8.9 : tablet ? 10.2 : 11.2;
      const visualWidth = portraitPhone ? (width < 380 ? 94 : 96) : landscapePhone ? 88 : tablet ? 92 : 98;
      const usableWidth = width * (portraitPhone ? 0.94 : landscapePhone ? 0.9 : tablet ? 0.94 : 0.96);
      const charWidth = fontSize * (portraitPhone ? 0.6 : 0.66);
      const cols = Math.max(portraitPhone ? 50 : landscapePhone ? 74 : 96, Math.min(184, Math.floor(usableWidth / charWidth)));
      const sampleRows = portraitPhone ? 22 : landscapePhone ? 30 : tablet ? 40 : 42;

      let top = 15.5;
      let bottom = 84.5;
      if (portraitPhone || landscapePhone) {
        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
        const targetRatio = portraitPhone ? 0.72 : 0.42;
        const minHeight = portraitPhone ? 30 : 54;
        const maxHeight = portraitPhone ? 38 : 72;
        const heightPct = clamp(((width * visualWidth / 100) * targetRatio / height) * 100, minHeight, maxHeight);
        const centerY = portraitPhone ? 51 : 50;
        top = centerY - heightPct / 2;
        bottom = centerY + heightPct / 2;
      }

      return { cols, sampleRows, visualWidth, fontSize, top, bottom, mobileProfile: portraitPhone };
    }

    function makeHeartSegment(start, end, cols, visualWidth) {
      const left = start / cols;
      const right = (end + 1) / cols;
      return {
        center: 50 - visualWidth / 2 + ((left + right) / 2) * visualWidth,
        width: Math.max(2, (right - left) * visualWidth)
      };
    }

    let resizeTimer = 0;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        updateLowPowerMode();
        resizeFxCanvas();
        if (!heartRows.length || !heartText.children.length) return;

        heartRows = buildHeartRows();
        applyHeartMaskLayout(getHeartLayout());
        heartText.querySelectorAll(".heart-row").forEach((line) => {
          const index = Number(line.dataset.row);
          const row = heartRows[index];
          if (!row) {
            line.remove();
            return;
          }

          line.textContent = row.text;
          line.setAttribute("y", `${row.localY ?? row.y}%`);
          line.style.fontSize = `${row.size}px`;
        });
      }, 160);
    });

    initQualityMode();
    letters.forEach(makeStar);
  </script>
</body>
</html>
